id: moderatorTriggers
name: GitOps.PullRequestIssueManagement
description: Defines the users and permissions for the moderators
owner:
resource: repository
disabled: false
where:
configuration:
  resourceManagementConfiguration:
    eventResponderTasks:
      - if:
          # If the activity sender is any one of the moderators, has Admin permission on the repo, or has Write permissions on the repo. . .
          - or:
              - activitySenderHasPermission:
                  permission: Admin
              - activitySenderHasPermission:
                  permission: Write
              - isActivitySender:
                  user: stephengillie
                  issueAuthor: False
              - isActivitySender:
                  user: Trenly
                  issueAuthor: False
              - isActivitySender:
                  user: mdanish-kh
                  issueAuthor: False
              - isActivitySender:
                  user: russellbanks
                  issueAuthor: False
        then:
          # If the payload is an issue_Comment or a Pull_Request_Review_Comment
          - if:
              - or:
                  - payloadType: Issue_Comment
                  - payloadType: Pull_Request_Review_Comment
            # Remove the Needs-Triage label
            # Take different actions based on the comment pattern
            then:
              - removeLabel:
                  label: Needs-Triage
              # Area-Bots
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+area[\s-]bots'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Bots
              # Area-Validation-Pipeline
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+area[\s-]validation[\s-]pipeline'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Validation-Pipeline
              # Blocking-Issue
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+blocking[\s-]issue'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - removeLabel:
                      label: Needs-Attention
                  - addLabel:
                      label: Blocking-Issue
              # GitDsc
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+GitDSC'
                      isRegex: True
                then:
                  - addLabel:
                      label: GitDsc
              # Help-Wanted
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+help[\s-]wanted'
                      isRegex: True
                then:
                  - addLabel:
                      label: Help-Wanted
              # In-PR
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+In[\s-]PR'
                      isRegex: True
                then:
                  - addLabel:
                      label: In-PR
              # Issue-Bug
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+issue[\s-]bug'
                      isRegex: True
                then:
                  - addLabel:
                      label: Issue-Bug
              # Issue-Docs
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+issue[\s-]docs'
                      isRegex: True
                then:
                  - addLabel:
                      label: Issue-Docs
              # Issue-Feature
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+issue[\s-]feature'
                      isRegex: True
                then:
                  - addLabel:
                      label: Issue-Feature
              # Microsoft.DotNet.Dsc
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Microsoft\.DotNet\.DSC'
                      isRegex: True
                then:
                  - addLabel:
                      label: Microsoft.DotNet.Dsc
              # Microsoft.VSCode.Dsc
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Microsoft\.VSCode\.DSC'
                      isRegex: True
                then:
                  - addLabel:
                      label: Microsoft.VSCode.Dsc
              # Microsoft.Windows.Developer
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Microsoft\.Windows\.Developer'
                      isRegex: True
                then:
                  - addLabel:
                      label: Microsoft.Windows.Developer
              # Microsoft.Windows.Setting.Accessibility
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Microsoft\.Windows\.Settings?\.Accessibility'
                      isRegex: True
                then:
                  - addLabel:
                      label: Microsoft.Windows.Setting.Accessibility
              # Microsoft.Windows.Settings
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Microsoft\.Windows\.Settings'
                      isRegex: True
                then:
                  - addLabel:
                      label: Microsoft.Windows.Settings
              # Microsoft.Windows.Setting.Language
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Microsoft\.Windows\.Settings?\.Language'
                      isRegex: True
                then:
                  - addLabel:
                      label: Microsoft.Windows.Setting.Language
              # Microsoft.Windows.Setting.System
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Microsoft\.Windows\.Settings?\.System'
                      isRegex: True
                then:
                  - addLabel:
                      label: Microsoft.Windows.Setting.System
              # Microsoft.Windows.Setting
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Microsoft\.Windows\.Settings?'
                      isRegex: True
                then:
                  - addLabel:
                      label: Microsoft.Windows.Setting
              # Moderator-Approved
              # - if:
              #       - commentContains:
              #             pattern: '(?in)\[Policy\]\s+moderator[\s-]Approved'
              #             isRegex: True
              #   then:
              #       - addLabel:
              #             label: Moderator-Approved
              # Needs-Attention
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Needs[\s-]Attention'
                      isRegex: True
                then:
                  - addLabel:
                      label: Needs-Attention
                  - addReply:
                      reply: >-
                        Hello ${issueAuthor},


                        Your pull request requires attention from a repository administrator. It has been assigned to a developer for review.


                        Template: msftbot/manualReview
              # Needs-Author-Feedback
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Needs[\s-]Author[\s-]feedback'
                      isRegex: True
                then:
                  - addLabel:
                      label: Needs-Author-Feedback
              # Needs-CLA
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Needs[\s-]CLA'
                      isRegex: True
                then:
                  - addLabel:
                      label: Needs-CLA
              # New-DSC-Resource
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+New[\s-]DSC[\s-]Resource'
                      isRegex: True
                then:
                  - addLabel:
                      label: New-DSC-Resource
              # NpmDsc
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+NPM\.DSC'
                      isRegex: True
                then:
                  - addLabel:
                      label: NpmDsc
              # PythonPip3Dsc
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+PythonPip3?DSC'
                      isRegex: True
                then:
                  - addLabel:
                      label: PythonPip3Dsc
              # PSA
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+PSA'
                      isRegex: True
                then:
                  - addLabel:
                      label: Public-Service-Announcement
              # YarnDsc
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+YarnDSC'
                      isRegex: True
                then:
                  - addLabel:
                      label: YarnDsc
              # Unblocked
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+unblocked'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Blocking-Issue
              # Reset-Feedback
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+reset\s+feedback'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - removeLabel:
                      label: Needs-Attention
                  #   - removeLabel:
                  #         label: Moderator-Approved
                  - removeLabel:
                      label: Changes-Requested
              # Reset-Labels
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+reset[\s-]+labels'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Area-Bots
                  - removeLabel:
                      label: Area-Validation-Pipeline
                  - removeLabel:
                      label: Blocking-Issue
                  - removeLabel:
                      label: Changes-Requested
                  - removeLabel:
                      label: GitDsc
                  - removeLabel:
                      label: Help-Wanted
                  - removeLabel:
                      label: In-PR
                  - removeLabel:
                      label: Issue-Bug
                  - removeLabel:
                      label: Issue-Docs
                  - removeLabel:
                      label: Issue-Feature
                  - removeLabel:
                      label: Microsoft.DotNet.Dsc
                  - removeLabel:
                      label: Microsoft.VSCode.Dsc
                  - removeLabel:
                      label: Microsoft.Windows.Developer
                  - removeLabel:
                      label: Microsoft.Windows.Setting.Accessibility
                  - removeLabel:
                      label: Microsoft.Windows.Setting.Language
                  - removeLabel:
                      label: Microsoft.Windows.Setting.System
                  - removeLabel:
                      label: Microsoft.Windows.Settings
                  - removeLabel:
                      label: Microsoft.Windows.Setting
                  #   - removeLabel:
                  #         label: Moderator-Approved
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - removeLabel:
                      label: Needs-CLA
                  - removeLabel:
                      label: New-DSC-Resource
                  - removeLabel:
                      label: NpmDsc
                  - removeLabel:
                      label: Project-File
                  - removeLabel:
                      label: Public-Service-Announcement
                  - removeLabel:
                      label: PythonPip3Dsc
                  - removeLabel:
                      label: YarnDsc
                  ## TODO: Dismiss All Pull Request Reviews
              # Duplicate of #
              - if:
                  - commentContains:
                      pattern: Duplicate\s+of\s+\#?\s*\d+
                      isRegex: True
                then:
                  - addReply:
                      reply: >-
                        Hello @${issueAuthor},


                        We've identified this as a duplicate of another issue or PR that already exists. This specific instance is being closed in favor of the linked issue. Please add your 👍 to the other issue to raise its priority. Thanks for your contribution!


                        Template: msftbot/duplicate/closed
                  - closeIssue
                  - removeLabel:
                      label: Needs-Triage
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - addLabel:
                      label: Resolution-Duplicate
              # Close with reason <>;
              - if:
                  - commentContains:
                      pattern: "(?in)close\\s+with\\s+reason\\s*:[\\w\\s\\-\\(\\)\\[\\]\\{\\}\\\\\\/.+=@\\#$%&^*`~|'\",<>?]*(?=;)"
                      isRegex: True
                then:
                  - closeIssue
                  - removeLabel:
                      label: Needs-Triage
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Needs-Author-Feedback
              # Reopen with reason <>;
              - if:
                  - commentContains:
                      pattern: "(?in)reopen\\s+with\\s+reason\\s*:[\\w\\s\\-\\(\\)\\[\\]\\{\\}\\\\\\/.+=@\\#$%&^*`~|'\",<>?]*(?=;)"
                      isRegex: True
                then:
                  - reopenIssue
                  - removeLabel:
                      label: Resolution-Duplicate
                  - removeLabel:
                      label: No-Recent-Activity
          # If the payload is a Pull_Request_Review and an approval, add the Moderator-Approved label
        #   - if:
        #       - payloadType: Pull_Request_Review
        #       - isReviewState:
        #           reviewState: Approved
        #     then:
        #       - addLabel:
        #           label: Moderator-Approved
onFailure:
onSuccess:
